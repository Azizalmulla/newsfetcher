name: newsfetcher

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: newsfetcher
      POSTGRES_USER: newsfetcher
      POSTGRES_PASSWORD: newsfetcher_dev_password
    ports:
      # Host Postgres often occupies 5432 locally; expose Compose DB on 5433.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsfetcher -d newsfetcher"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/newsfetcher || true &&
      exit 0
      "

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+psycopg://newsfetcher:newsfetcher_dev_password@postgres:5432/newsfetcher
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
      STORAGE_BACKEND: s3
      EMAIL_BACKEND: file
      EMAIL_FILE_DIR: /tmp/newsfetcher-mail
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      /bin/sh -c "uv run alembic upgrade head &&
      uv run python -m app.db.seed &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+psycopg://newsfetcher:newsfetcher_dev_password@postgres:5432/newsfetcher
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
      STORAGE_BACKEND: s3
      EMAIL_BACKEND: file
      EMAIL_FILE_DIR: /tmp/newsfetcher-mail
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: >
      uv run celery -A app.workers.celery_app.celery_app worker
      --loglevel=INFO -Q source.health,source.discovery,article.fetch,report.render,report.deliver,matching.lexical,matching.semantic

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
