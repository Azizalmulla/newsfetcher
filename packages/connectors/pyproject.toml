[project]
name = "newsfetcher-connectors"
version = "0.1.0"
description = "Source connector framework for NewsFetcher"
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.28.0",
  "feedparser>=6.0.11",
  "beautifulsoup4>=4.12.0",
  "lxml>=5.3.0",
  "pydantic>=2.9.0",
]

[project.optional-dependencies]
browser = ["playwright>=1.49.0"]
dev = ["pytest>=8.3.0", "playwright>=1.49.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["newsfetcher_connectors"]

[tool.pytest.ini_options]
testpaths = ["tests"]
