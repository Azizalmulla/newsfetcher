# Phase 8 — formal closure for every mandatory channel.
# Disposition values: active | blocked | awaiting_licensing | temporarily_broken
# Rules:
#   - legal_gate remains pending unless an explicit legal decision is recorded elsewhere
#   - connector.enabled remains false (no live scrape in Phase 8)
#   - "active" means technically ready / connector implemented, still gated

version: 1
updated: "2026-07-22"
channels:
  - publisher: alanba
    channel: web_ar
    disposition: active
    assessment_status: approved_for_rss
    recommended_connector: rss
    connector_config:
      phase: 8
      ingestion_enabled: false
      requires_legal_gate: true
      feed_urls:
        - https://www.alanba.com.kw/rss/kuwait-news
        - https://www.alanba.com.kw/rss/economy-news
        - https://www.alanba.com.kw/rss/sport-news
        - https://www.alanba.com.kw/rss/art-news
        - https://www.alanba.com.kw/rss/arabic-international-news
      max_urls: 200
    recovery_plan: null
    notes: Prefer live RSS section feeds over stale sitemaps. Legal gate pending.

  - publisher: alanba
