    notes: >
      Public full-edition PDFs are available at pdf.alanba.com.kw using
      /pdf/{yyyy}/{mm}/{dd-mm-yyyy}/{dd-mm-yyyy}.pdf. Ops enablement flips
      download_enabled + legal_gate; closure apply keeps connector disabled.

